<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Créer une campagne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['Space Grotesk', 'sans-serif'],
          sans: ['Inter', 'sans-serif'],
        },
        colors: {

          gold: {
            400: '#e0b559',
            500: '#d4a857',
          },
          brand: {
            600: '#2f5fd6',
            700: '#274ec2',
          },
          leaf: {

            700: '#17824a',
          },
        },
      },
    },
  }
</script>
</head>
<body class="min-h-screen bg-[#eef1f7] text-[#101a2e] font-sans flex">

<!-- sidebare -->
  <aside class="w-[246px] shrink-0 h-screen sticky top-0 flex flex-col p-[26px_18px] text-white bg-[#3F4E72]">
    <div class="flex items-center gap-2.5 pb-[26px] mb-[18px] border-b border-white/10 px-2">
      <svg class="w-[34px] h-[34px] shrink-0" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="32" cy="46" rx="20" ry="7" fill="#16233d"/>
        <ellipse cx="32" cy="40" rx="20" ry="7" fill="#274ec2"/>
        <ellipse cx="32" cy="34" rx="20" ry="7" fill="#2f5fd6"/>
        <ellipse cx="32" cy="24" rx="20" ry="10" fill="#e0b559"/>
        <ellipse cx="32" cy="24" rx="20" ry="10" stroke="#c99843" stroke-width="1.5"/>
      </svg>
      <div class="font-display text-[13.5px] font-semibold leading-tight">
        Gestion des Cotisations
                      <span class="block text-[10px] font-medium tracking-[0.14em] uppercase text-[#d99a2b] mt-0.5  ">Espace Gerant</span>

      </div>
    </div>

    <nav class="flex flex-col gap-[3px] flex-1">
      <a href="gerdashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-[10px] text-white/70 text-sm font-medium hover:bg-white/[0.06] hover:text-white transition cursor-pointer">
        <svg class="w-[18px] h-[18px] opacity-85" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Tableau de bord
      </a>

      <a  class="flex items-center gap-3 px-3 py-2.5 rounded-[10px] text-white text-sm font-medium bg-[#d99a2b]/20 cursor-pointer">
        <svg class="w-[18px] h-[18px] opacity-85" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        Campagnes
      </a>
      <a href="paiement.html"  class="flex items-center gap-3 px-3 py-2.5 rounded-[10px] text-white/70 text-sm font-medium hover:bg-white/[0.06] hover:text-white transition cursor-pointer">
        <svg class="w-[18px] h-[18px] opacity-85" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        Paiements
      </a>
      <a href="retadataire.html" class="flex items-center gap-3 px-3 py-2.5 rounded-[10px] text-white/70 text-sm font-medium hover:bg-white/[0.06] hover:text-white transition cursor-pointer">
        <svg class="w-[18px] h-[18px] opacity-85" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Retardataires
      </a>


      <div class="h-px bg-white/10 my-3.5 mx-1"></div>

      <a class="flex items-center gap-3 px-3 py-2.5 rounded-[10px] text-red-300/85 text-sm font-medium hover:bg-red-500/10 hover:text-red-200 transition cursor-pointer">
        <svg class="w-[18px] h-[18px] opacity-85" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Déconnexion
      </a>
    </nav>
  </aside>

  <!--  MAIN-->
  <main class="flex-1 min-w-0 px-8 lg:px-10 py-8 pb-14">

    <h1 class="font-display text-[26px] font-bold tracking-tight mb-1">Créer une campagne</h1>

    <!-- Form card -->
    <form class="max-w-2xl bg-white border border-[#e6e8f0] rounded-2xl shadow-sm p-8 lg:p-10">

      <div class="mb-6">
        <label for="titre" class="block text-[13px] font-semibold text-[#101a2e] mb-2">Titre de la campagne</label>
        <input type="text" id="titre" name="titre" placeholder="Ex : cotisation Anniverssaire"
          class="w-full px-4 py-3 rounded-[10px] border border-[#e6e8f0] bg-[#f6f7fb] text-[14.5px] text-[#101a2e] placeholder-[#9aa3b5] outline-none focus:border-brand-600 focus:bg-white focus:ring-4 focus:ring-brand-600/10 transition">
      </div>

      <div class="mb-6">
        <label for="type" class="block text-[13px] font-semibold text-[#101a2e] mb-2">Type de campagne</label>
        <div class="relative">
          <select id="type" name="type"
            class="w-full appearance-none px-4 py-3 rounded-[10px] border border-[#e6e8f0] bg-[#f6f7fb] text-[14.5px] text-[#101a2e] outline-none focus:border-brand-600 focus:bg-white focus:ring-4 focus:ring-brand-600/10 transition cursor-pointer">
            <option value="" disabled selected>Sélectionner un type</option>
            <option value="hebdomadaire">Hebdomadaire</option>
            <option value="anniversaire">Anniversaire</option>
            <option value="deces">Décès</option>
          </select>
          <svg class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-[#9aa3b5]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-6">
        <div>
          <label for="montant" class="block text-[13px] font-semibold text-[#101a2e] mb-2">Montant</label>
          <div class="relative">
            <input type="number" id="montant" name="montant" min="0" step="500" placeholder="500"
              class="w-full px-4 py-3 pr-14 rounded-[10px] border border-[#e6e8f0] bg-[#f6f7fb] text-[14.5px] text-[#101a2e] placeholder-[#9aa3b5] outline-none focus:border-brand-600 focus:bg-white focus:ring-4 focus:ring-brand-600/10 transition">
            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[13px] font-medium text-[#9aa3b5]">FCFA</span>
          </div>
        </div>

        <div>
          <label for="date_debut" class="block text-[13px] font-semibold text-[#101a2e] mb-2">Date de début</label>
          <input type="date" id="date_debut" name="date_debut"
            class="w-full px-4 py-3 rounded-[10px] border border-[#e6e8f0] bg-[#f6f7fb] text-[14.5px] text-[#101a2e] outline-none focus:border-brand-600 focus:bg-white focus:ring-4 focus:ring-brand-600/10 transition">
        </div>
      </div>


      <div class="flex flex-col sm:flex-row gap-3 pt-2 border-t border-[#e6e8f0]">
        <button type="submit"
          class="order-2 sm:order-1 flex-1 inline-flex items-center justify-center gap-2 px-5 py-3 mt-6 rounded-[10px] bg-gradient-to-b from-brand-600 to-brand-700 text-white text-[14.5px] font-semibold shadow-[0_8px_18px_-8px_rgba(39,78,194,0.55)] hover:brightness-[1.06] active:translate-y-px transition">
          Créer la campagne
        </button>
        <button type="button"
          class="order-1 sm:order-2 flex-1 inline-flex items-center justify-center gap-2 px-5 py-3 mt-6 rounded-[10px] border border-[#e6e8f0] bg-white text-[#3d4558] text-[14.5px] font-semibold hover:bg-[#f6f7fb] active:translate-y-px transition">
          Annuler
        </button>
      </div>
    </form>

  </main>

</body>
</html>
