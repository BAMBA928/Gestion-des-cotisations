      <div>
        <h1 class="font-display text-[22px] font-bold tracking-tight mb-1">Mes cotisations</h1>
      </div>
    </div>


  
    <div class="bg-white border border-[#e6e8f0] rounded-2xl shadow-sm p-4 mb-[18px] flex items-center gap-3 flex-wrap">
      <div class="relative flex-1 min-w-[220px]">
        <svg class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-[#9aa3b5]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Rechercher une campagne…"

      </div>

      <select class="px-3.5 py-2.5 rounded-[10px] border border-[#e6e8f0] text-[13px] text-[#5b6478] bg-white focus:outline-none focus:ring-2 focus:ring-brand-600/30">
        <option>Tous les statuts</option>
        <option>Payé</option>
        <option>En attente</option>
        <option>Retard</option>
      </select>

    </div>

    <!-- Table -->
    <div class="bg-white border border-[#e6e8f0] rounded-2xl shadow-sm overflow-hidden">
      <div class="flex items-center justify-between px-[22px] py-[18px] border-b border-[#e6e8f0]">
        <h2 class="font-display text-[15.5px] font-bold">Mes cotisations</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>
            <tr class="bg-[#f6f7fb]">
              <th class="text-left text-[11.5px] font-semibold uppercase tracking-wider text-[#9aa3b5] px-[22px] py-3 border-b border-[#e6e8f0]">Campagne</th>
              <th class="text-left text-[11.5px] font-semibold uppercase tracking-wider text-[#9aa3b5] px-[22px] py-3 border-b border-[#e6e8f0]">Montant</th>
              <th class="text-left text-[11.5px] font-semibold uppercase tracking-wider text-[#9aa3b5] px-[22px] py-3 border-b border-[#e6e8f0]">Date</th>

            </tr>
          </thead>
          <tbody>

            <tr class="hover:bg-[#f6f7fb] transition">
              <td class="px-[22px] py-3.5 text-[13.5px] font-semibold text-[#101a2e] border-b border-[#e6e8f0]">Anniversaire</td>
              <td class="px-[22px] py-3.5 text-[13.5px] font-display font-semibold text-[#101a2e] border-b border-[#e6e8f0]">500 F</td>
              <td class="px-[22px] py-3.5 text-[13.5px] text-[#5b6478] border-b border-[#e6e8f0]">10 juil. 2026</td>
              <td class="px-[22px] py-3.5 border-b border-[#e6e8f0]">
                <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11.5px] font-semibold bg-leaf-600/10 text-leaf-600"><span class="w-1.5 h-1.5 rounded-full bg-current"></span>Payé</span>
              </td>

            </tr>

            <tr class="hover:bg-[#f6f7fb] transition">
              <td class="px-[22px] py-3.5 text-[13.5px] font-semibold text-[#101a2e] border-b border-[#e6e8f0]">Hebdomadaire</td>
              <td class="px-[22px] py-3.5 text-[13.5px] font-display font-semibold text-[#101a2e] border-b border-[#e6e8f0]">100 F</td>
              <td class="px-[22px] py-3.5 text-[13.5px] text-[#5b6478] border-b border-[#e6e8f0]">04 juil. 2026</td>
              <td class="px-[22px] py-3.5 border-b border-[#e6e8f0]">
                <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11.5px] font-semibold bg-leaf-600/10 text-leaf-600"><span class="w-1.5 h-1.5 rounded-full bg-current"></span>Payé</span>

              <td class="px-[22px] py-3.5 text-[13.5px] font-semibold text-[#101a2e] border-b border-[#e6e8f0]">Décès</td>
              <td class="px-[22px] py-3.5 text-[13.5px] font-display font-semibold text-[#101a2e] border-b border-[#e6e8f0]">500 F</td>
              <td class="px-[22px] py-3.5 text-[13.5px] text-[#5b6478] border-b border-[#e6e8f0]">—</td>
              <td class="px-[22px] py-3.5 border-b border-[#e6e8f0]">
                <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11.5px] font-semibold bg-[#d99a2b]/[0.14] text-[#d99a2b]"><span class="w-1.5 h-1.5 rounded-full bg-current"></span>En attente</span>
              </td>

            </tr>





          </tbody>
        </table>
