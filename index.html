
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Gestion des Cotisations</title>


    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-slate-700 min-h-screen flex items-center justify-center p-5 font-[Inter]">

    <main class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">

        

        <div class="flex flex-col items-center">

      <svg class="w-[34px] h-[34px] shrink-0" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="32" cy="46" rx="20" ry="7" fill="#16233d"/>
        <ellipse cx="32" cy="40" rx="20" ry="7" fill="#274ec2"/>
        <ellipse cx="32" cy="34" rx="20" ry="7" fill="#2f5fd6"/>
        <ellipse cx="32" cy="24" rx="20" ry="10" fill="#e0b559"/>
        <ellipse cx="32" cy="24" rx="20" ry="10" stroke="#c99843" stroke-width="1.5"/>
      </svg>

            <h1 class="mt-5 text-xl font-bold uppercase tracking-widest text-slate-700">
                Gestion des Cotisations
            </h1>

            <p class="mt-2 text-xl font-semibold text-slate-800">
                Bon retour
            </p>

            <p class="text-blue-700 text-sm mt-1">
            Se connecter
            </p>

        </div>


        <form class="mt-8 space-y-5 " action="gerant/gerdashboard.html">

            <div>

                <label class="block mb-2 text-sm font-medium text-slate-700">
                    Email
                </label>

                <input
                    type="email"
                    placeholder="nom@exemple.com"

                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3
                    focus:outline-none focus:ring-2 focus:ring-blue-600">

            </div>

            <div>

                <label class="block mb-2 text-sm font-medium text-slate-700">
                    Mot de passe
                </label>

                <input
                    type="password"
                    placeholder="********"

                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3
                    focus:outline-none focus:ring-2 focus:ring-blue-600">

            </div>

            <button
                type="submit"
                class="w-full rounded-xl bg-blue-700 py-3 text-white font-semibold
                hover:bg-blue-800 duration-300 shadow-lg">

                Se connecter

            </button>

        </form>

        <!-- Liens -->

        <div class="mt-5 flex justify-between text-sm">

            <a href="#" class="text-slate-500 hover:text-blue-700">
                Mot de passe oublié ?
            </a>

            <a href="inscription.html"
                class="font-semibold text-blue-700 hover:underline">

                S'inscrire

            </a>

        </div>

    </main>

</body>
</html>
