<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inscription</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body class="bg-slate-700 min-h-screen flex items-center justify-center p-6 font-[Inter]">

<main class="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-8">



<div class="flex flex-col items-center">



<h1  class="mt-2 text-xl font-semibold">

Créer un compte

</h1>
<p class="text-blue-700 text-sm">

Inscription

</p>

</div>

<!-- Formulaire -->

<form class="mt-8 space-y-5">

<div class="grid grid-cols-2 gap-4">

<div>

<label class="block mb-2 text-sm font-medium text-slate-700">

Prénom

</label>

<input
type="text"
placeholder="Assatou"

class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 focus:ring-2 focus:ring-blue-600 outline-none">

</div>

<div>

<label class="block mb-2 text-sm font-medium text-slate-700">

Nom

</label>

<input
type="text"
placeholder="Diop"

class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 focus:ring-2 focus:ring-blue-600 outline-none">

</div>

</div>

<div>

<label class="block mb-2 text-sm font-medium text-slate-700">

Email

</label>

<input
type="email"
placeholder="nom@exemple.com"

class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 focus:ring-2 focus:ring-blue-600 outline-none">

</div>

<div>

<label class="block mb-2 text-sm font-medium text-slate-700">

Téléphone

</label>

<input
type="tel"
placeholder="+221 77 123 45 67"

class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 focus:ring-2 focus:ring-blue-600 outline-none">

</div>

<div>

<label class="block mb-2 text-sm font-medium text-slate-700">

Mot de passe

</label>

<input
type="password"
placeholder="********"

class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 focus:ring-2 focus:ring-blue-600 outline-none">

</div>

<div>

<label class="block mb-2 text-sm font-medium text-slate-700">

Confirmer le mot de passe

</label>

<input
type="password"
placeholder="********"

class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 focus:ring-2 focus:ring-blue-600 outline-none">

</div>

<button

class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 rounded-xl shadow-lg transition">

S'inscrire

</button>

</form>

<div class="mt-6 text-center text-sm">

<span class="text-slate-500">

Déjà un compte ?

</span>

<a href="index.html"

class="text-blue-700 font-semibold hover:underline">

Se connecter

</a>

</div>

</main>

</body>

</html>
